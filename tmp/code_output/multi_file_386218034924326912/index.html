<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1><i class="fas fa-tasks"></i> Todo List</h1>
            <p class="subtitle">Organize your tasks efficiently</p>
        </header>

        <main class="app-main">
            <section class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="todo-input" 
                        placeholder="Enter a new task..."
                        maxlength="100"
                    >
                    <button id="add-btn" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Add Task
                    </button>
                </div>
                <div class="task-stats">
                    <span id="total-tasks">Total: 0</span>
                    <span id="completed-tasks">Completed: 0</span>
                    <span id="pending-tasks">Pending: 0</span>
                </div>
            </section>

            <section class="filter-section">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All Tasks</button>
                    <button class="filter-btn" data-filter="pending">Pending</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
                <button id="clear-completed" class="btn btn-secondary">
                    <i class="fas fa-trash"></i> Clear Completed
                </button>
            </section>

            <section class="tasks-section">
                <div class="tasks-container">
                    <ul id="tasks-list">
                        <!-- Tasks will be dynamically added here -->
                        <li class="empty-state">
                            <i class="fas fa-clipboard-list"></i>
                            <p>No tasks yet. Add your first task above!</p>
                        </li>
                    </ul>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <p>Double-click to edit tasks • Click checkbox to complete</p>
            <p class="copyright">© 2023 Todo List App</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
