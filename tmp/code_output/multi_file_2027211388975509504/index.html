<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✓</text></svg>">
</head>
<body>
    <header>
        <div class="container">
            <h1>Task Tracker</h1>
            <p>Organize your tasks efficiently</p>
        </div>
    </header>

    <main class="container">
        <section class="task-form">
            <h2>Add New Task</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label for="taskTitle">Task Title</label>
                    <input type="text" id="taskTitle" placeholder="Enter task title" required>
                </div>
                <div class="form-group">
                    <label for="taskDescription">Description</label>
                    <textarea id="taskDescription" placeholder="Enter task description"></textarea>
                </div>
                <div class="form-group">
                    <label for="taskPriority">Priority</label>
                    <select id="taskPriority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Add Task</button>
            </form>
        </section>

        <section class="task-list">
            <h2>Your Tasks</h2>
            <div class="filters">
                <button class="btn filter-btn active" data-filter="all">All</button>
                <button class="btn filter-btn" data-filter="pending">Pending</button>
                <button class="btn filter-btn" data-filter="completed">Completed</button>
            </div>
            <div id="tasksContainer">
                <!-- Tasks will be dynamically inserted here -->
                <p class="no-tasks">No tasks added yet. Start by adding a task above!</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>© 2023 Task Tracker. Built with HTML, CSS & JavaScript.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
