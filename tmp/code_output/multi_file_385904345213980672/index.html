<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-tasks"></i> My To-Do List</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <main class="main-content">
            <div class="input-section">
                <div class="input-group">
                    <input type="text" id="taskInput" placeholder="Add a new task..." maxlength="100">
                    <button id="addTaskBtn" class="btn-primary">
                        <i class="fas fa-plus"></i> Add Task
                    </button>
                </div>
                <div class="filter-section">
                    <button class="filter-btn active" data-filter="all">All Tasks</button>
                    <button class="filter-btn" data-filter="pending">Pending</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
            </div>

            <div class="stats-section">
                <div class="stat-card">
                    <span class="stat-number" id="totalTasks">0</span>
                    <span class="stat-label">Total Tasks</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="pendingTasks">0</span>
                    <span class="stat-label">Pending</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="completedTasks">0</span>
                    <span class="stat-label">Completed</span>
                </div>
            </div>

            <div class="tasks-section">
                <h2>Your Tasks</h2>
                <div class="tasks-container">
                    <ul id="taskList">
                        <!-- Tasks will be dynamically added here -->
                    </ul>
                    <div id="emptyState" class="empty-state">
                        <i class="fas fa-clipboard-list"></i>
                        <h3>No tasks yet</h3>
                        <p>Add your first task using the input above</p>
                    </div>
                </div>
            </div>

            <div class="actions-section">
                <button id="clearCompletedBtn" class="btn-secondary">
                    <i class="fas fa-check-double"></i> Clear Completed
                </button>
                <button id="clearAllBtn" class="btn-danger">
                    <i class="fas fa-trash-alt"></i> Clear All Tasks
                </button>
            </div>
        </main>

        <footer class="footer">
            <p>Tasks are saved in your browser's local storage</p>
            <p class="hint">Click on a task to mark it as complete/incomplete</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
