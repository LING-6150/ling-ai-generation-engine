spring:
  application:
    name: Ling-AI-CODE-generation-backend
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: local
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8123
  servlet:
    context-path: /api

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.ling.lingaicodegeneration.controller

# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

#redisson:
  #onfig: |
    #singleServerConfig:
      #address: "redis://localhost:6379"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

# Multi-agent orchestrator feature flag
# false = legacy LangGraph4j path (production default, stable)
# true  = new multi-agent path (enable after P6 validation)
agent:
  orchestrator:
    enabled: false

context:
  pruning:
    diagnostics:
      enabled: false
